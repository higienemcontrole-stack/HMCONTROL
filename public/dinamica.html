<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM Control — Tabela Dinâmica Geral</title>
    <link rel="stylesheet" href="/src/styles/design-system.css?v=5.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        .pivot-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; box-shadow: var(--shadow-md); border-radius: 8px; overflow: hidden; }
        .pivot-table th { background: #4472C4; color: white; padding: 12px; border: 1px solid #ffffff; text-align: center; font-size: 13px; text-transform: uppercase; }
        .pivot-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; font-size: 13px; background: white; }
        .pivot-table tr:nth-child(even) td { background: #f1f5f9; }
        .row-label { text-align: left !important; font-weight: 700; background: #e2e8f0 !important; color: #1e3a8a; }
        .total-cell { font-weight: 700; background: #d1d5db !important; color: #000; }
        .percentage-cell { color: #f59e0b; font-weight: 800; background: white !important; }
        .percentage-cell.high { color: #16a34a; }
        .percentage-cell.low { color: #dc2626; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="navbar-superior">
        <button class="mobile-menu-btn" id="mobile-menu-toggle" onclick="HM.toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-brand">HM CONTROL</div>
        <nav class="nav-links">
            <a href="/index.html" class="nav-link"><i class="fas fa-home"></i> HOME</a>
            <a href="/dashboard.html" class="nav-link"><i class="fas fa-chart-bar"></i> DASHBOARD</a>
            <a href="/registro.html" class="nav-link"><i class="fas fa-edit"></i> REGISTRO</a>
            <a href="/tabulacao.html" class="nav-link"><i class="fas fa-table"></i> TABULAÇÃO</a>
            <a href="/dinamica.html" class="nav-link active"><i class="fas fa-sync"></i> DINÂMICA</a>
            <a href="/validacoes.html" class="nav-link"><i class="fas fa-check-double"></i> VALIDAÇÕES</a>
            <div class="nav-dropdown">
                <a href="javascript:void(0)" class="nav-link"><i class="fas fa-cogs"></i> CONFIGURAÇÕES</a>
                <div class="nav-dropdown-content">
                    <a href="javascript:HM.syncDatabase()"><i class="fas fa-sync"></i> Sincronizar Base</a>
                    <a href="javascript:HM.clearCache()"><i class="fas fa-eraser"></i> Limpar Cache</a>
                </div>
            </div>
        </nav>
        <div class="nav-user-container" id="user-menu-trigger" onclick="HM.toggleUserMenu(event)">
            <div class="nav-user">
                <i class="fas fa-user-circle"></i>
            </div>
            <span class="user-name" id="display-user-name">Usuário</span>
            
            <!-- Dropdown Menu -->
            <div class="dropdown-menu" id="user-dropdown">
                <button class="dropdown-item" onclick="HM.openProfileModal()">
                    <i class="fas fa-user-cog"></i> Meu Perfil
                </button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" onclick="HM.logout()" style="color: var(--danger);">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>
    </header>

    <!-- Modal de Perfil (Popup) -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-user-edit"></i> Configurações de Perfil
                </div>
                <button class="btn-close-modal" onclick="HM.closeProfileModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="profile-field-group">
                    <label>Nome Completo</label>
                    <input type="text" id="profile-name" class="profile-input" placeholder="Seu nome">
                </div>
                
                <div class="profile-field-group">
                    <label>E-mail (Login)</label>
                    <input type="email" id="profile-email" class="profile-input" disabled>
                </div>

                <div class="profile-field-group">
                    <label>Nova Senha (opcional)</label>
                    <input type="password" id="profile-password" class="profile-input" placeholder="Mudar senha">
                </div>

                <div class="profile-field-group">
                    <label>Cargo / Perfil</label>
                    <select id="profile-role" class="profile-input">
                        <option value="user">Usuário Comum</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <div>
                    <div class="modal-section-title">Telas com Acesso</div>
                    <div class="access-list" id="profile-screens">
                        <label class="access-item"><input type="checkbox" value="dashboard" checked disabled> Dashboard</label>
                        <label class="access-item"><input type="checkbox" value="registro"> Registro</label>
                        <label class="access-item"><input type="checkbox" value="tabulacao"> Tabulação</label>
                        <label class="access-item"><input type="checkbox" value="dinamica"> Dinâmica</label>
                        <label class="access-item"><input type="checkbox" value="validacoes"> Validações</label>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="HM.closeProfileModal()">Cancelar</button>
                <button class="btn-modal-save" onclick="HM.saveProfileData()" id="btn-save-profile">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <header style="margin-bottom: 30px; display: flex; align-items: center; gap: 20px;">
            <a href="index.html" class="btn-icon" style="color: var(--primary); font-size: 20px;"><i class="fas fa-arrow-left"></i></a>
            <div>
                <h1 class="text-title">TABELA DINÂMICA GERAL</h1>
                <p class="text-subtitle">Cruzamento de dados: Categoria vs. Momento Observado</p>
            </div>
        </header>

        <div class="card-premium">
            <div id="pivot-container" style="overflow-x: auto;">
                <p class="text-subtitle">Processando dados do Excel...</p>
            </div>
        </div>
    </main>
</div>

<script src="/src/js/services/apiService.js"></script>
<script src="/src/js/core.js?v=5.1"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('/api/excel/pivot');
            const data = await response.json();
            
            if (!data || data.length === 0) {
                document.getElementById('pivot-container').innerHTML = '<p>Nenhum dado encontrado para gerar a dinâmica.</p>';
                return;
            }

            // Mapear cabeçalhos (Colunas do Pivot)
            const headers = Object.keys(data[0]);
            
            let html = '<table class="pivot-table"><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h];
                    let className = '';
                    
                    if (h.includes('CATEGORIA') || h.includes('MOMENTO') || h === 'index' || h === 'Profissional Auditado') className = 'row-label';
                    if (val === 'Total' || row['CATEGORIA'] === 'Total' || row['index'] === 'Total' || row['Profissional Auditado'] === 'Total') className = 'total-cell';
                    
                    html += `<td class="${className}">${val}</td>`;
                 });
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('pivot-container').innerHTML = html;

        } catch (e) { 
            console.error("Falha ao carregar pivot", e);
            document.getElementById('pivot-container').innerHTML = '<p style="color:red">Erro ao carregar dados da Tabela Dinâmica.</p>';
        }
    });
</script>
<script src="/src/js/services/apiService.js?v=3.23.5"></script>
<script src="/src/js/core.js?v=3.23.5"></script>
</body>
</html>
